<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Successful — BUYCO</title>
<meta name="theme-color" content="#0D1640">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#1C2B6E;--navy-deep:#0D1640;--orange:#F5821F;--orange-dark:#D96E10;--white:#FFFFFF;--off-white:#F4F5F8;--grey:#8A919E;--grey-light:#E8EAF0;--text-dark:#1A1F2E;--text-body:#3D4459}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Barlow',sans-serif;background:var(--off-white);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}

  .card{background:var(--white);border-radius:10px;padding:52px 48px;width:100%;max-width:540px;box-shadow:0 2px 20px rgba(28,43,110,0.09);border:1px solid var(--grey-light);text-align:center;animation:fadeUp .5s ease both}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* Logo — matches nav exactly */
  .logo-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-bottom:32px}
  .logo-mark{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:48px;color:var(--navy);letter-spacing:-2px;line-height:1}
  .logo-mark .o{color:var(--orange)}.logo-mark .dot{font-size:13px;color:var(--orange);vertical-align:super}
  .logo-sub{font-size:8px;color:var(--grey);letter-spacing:2px;text-transform:uppercase;font-weight:700;text-align:center}

  /* Success box — orange border, matches screenshot */
  .success-box{border:2px solid var(--orange);border-radius:8px;padding:40px 32px;margin-bottom:0}
  .success-box h1{font-family:'Barlow',sans-serif;font-weight:700;font-size:24px;color:var(--text-dark);margin-bottom:12px}
  .success-box .line1{font-size:15px;color:var(--text-body);margin-bottom:20px}
  .success-box .line2{font-size:14px;color:var(--text-body);line-height:1.7;margin-bottom:32px;max-width:380px;margin-left:auto;margin-right:auto}

  .btn-home{background:var(--orange);color:var(--white);padding:14px 36px;border-radius:6px;font-family:'Barlow',sans-serif;font-weight:700;font-size:15px;text-decoration:none;display:inline-block;transition:background .2s,transform .15s}
  .btn-home:hover{background:var(--orange-dark);transform:translateY(-1px)}

  .page-footer{position:fixed;bottom:0;left:0;right:0;height:8px;background:var(--orange)}

  @media(max-width:480px){.card{padding:36px 24px}.success-box{padding:28px 20px}}
</style>
</head>
<body>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-mark">BUY<span class="o">CO</span><span class="dot">.</span></div>
    <div class="logo-sub">The Building Company's Collective Buying Group</div>
  </div>

  <div class="success-box">
    <h1>Registration Successful!</h1>
    <p class="line1">Thank you for registering with BUYCO.</p>
    <p class="line2">A member of the BUYCO team will be in touch with you shortly to discuss the next steps.</p>
    <a href="index.html" class="btn-home">Return Home</a>
  </div>
</div>

<div class="page-footer"></div>

</body>
</html>
